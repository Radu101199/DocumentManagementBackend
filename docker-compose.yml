version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - documentmanagement-network

  redis:
    image: redis:7-alpine
    container_name: documentmanagement-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - documentmanagement-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: documentmanagement-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=mydatabase;Username=myuser;Password=mypassword;Search Path=DocumentManagement,public"
      Jwt__Secret: "your-super-secret-key-min-32-characters!!"
      Jwt__Issuer: "DocumentManagementBackend"
      Jwt__Audience: "DocumentManagementFrontend"
      Redis__ConnectionString: "documentmanagement-redis:6379"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - dataprotection:/data/dataprotection
    networks:
      - documentmanagement-network
    restart: unless-stopped

networks:
  documentmanagement-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  dataprotection: